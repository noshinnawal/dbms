<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - EduSoft SMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"surface-bright": "#f5faff", "on-primary": "#ffffff", outline: "#707979", "tertiary-container": "#ffefea", "on-secondary-container": "#7a4342", "surface-container-highest": "#dbe4eb", primary: "#396568", "on-primary-fixed": "#002022", background: "#f5faff", "surface-container-lowest": "#ffffff", "surface-container": "#e6eff6", "on-tertiary-fixed": "#2a1710", "primary-container": "#ccfbfe", "tertiary-fixed": "#ffdbcf", error: "#ba1a1a", "on-tertiary-fixed-variant": "#594139", "on-background": "#141d22", "secondary-fixed": "#ffdad8", "secondary-container": "#feb4b1", "on-primary-fixed-variant": "#1f4d50", "secondary-fixed-dim": "#feb4b1", "on-secondary-fixed": "#360d0e", "surface-container-low": "#ecf5fc", "inverse-surface": "#293237", "on-primary-container": "#497578", "outline-variant": "#c0c8c8", "surface-tint": "#396568", secondary: "#884e4d", surface: "#f5faff", "on-secondary": "#ffffff", "surface-container-high": "#e0e9f0", "on-tertiary-container": "#84685e", "primary-fixed-dim": "#a1cfd2", "on-tertiary": "#ffffff", "inverse-primary": "#a1cfd2", tertiary: "#73584f", "surface-dim": "#d2dbe2", "primary-fixed": "#bcebee", "on-secondary-fixed-variant": "#6c3737", "on-error": "#ffffff", "tertiary-fixed-dim": "#e1bfb4", "on-surface-variant": "#404849", "error-container": "#ffdad6", "on-error-container": "#93000a", "on-surface": "#141d22", "inverse-on-surface": "#e9f2f9", "surface-variant": "#dbe4eb"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {sm: "8px", margin: "32px", xl: "48px", unit: "8px", md: "16px", xs: "4px", lg: "24px", gutter: "24px"}, fontFamily: {h2: ["Lexend"], caption: ["Lexend"], h1: ["Lexend"], "body-md": ["Lexend"], h3: ["Lexend"], "body-lg": ["Lexend"], "label-sm": ["Lexend"], headline: ["Lexend"], display: ["Lexend"], body: ["Lexend"], label: ["Lexend"]}, fontSize: {h2: ["32px", {lineHeight: "1.3", fontWeight: "600"}], caption: ["12px", {lineHeight: "1.4", fontWeight: "400"}], h1: ["40px", {lineHeight: "1.2", fontWeight: "700"}], "body-md": ["16px", {lineHeight: "1.6", fontWeight: "400"}], h3: ["24px", {lineHeight: "1.4", fontWeight: "600"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}], "label-sm": ["14px", {lineHeight: "1.4", letterSpacing: "0.02em", fontWeight: "500"}]}}}};</script>
<style>
        /* Ensures body takes up full height and applies base background */
        body {
            background-color: #e6eff6; /* surface-container */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased">
<!-- Neomorphic Login Card -->
<main class="w-full max-w-[420px] bg-surface-container rounded-[32px] p-10 md:p-12 shadow-[16px_16px_32px_#dbe4eb,-16px_-16px_32px_#ffffff] flex flex-col items-center">
<!-- Branding Header -->
<header class="w-full flex flex-col items-center mb-10">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 shadow-[6px_6px_12px_#dbe4eb,-6px_-6px_12px_#ffffff]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface text-center tracking-tight">EduSoft SMS</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">Welcome back to the portal</p>
</header>
<!-- Login Form -->
<form action="#" class="w-full flex flex-col gap-6" method="POST">
<!-- Email Input Group -->
<div class="w-full">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-3 ml-2" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant select-none pointer-events-none" data-icon="mail">mail</span>
<input class="w-full bg-surface-container border-none rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-1 focus:ring-primary/30 shadow-[inset_6px_6px_12px_#dbe4eb,inset_-6px_-6px_12px_#ffffff] transition-shadow duration-200" id="email" name="email" placeholder="admin@st-edwards.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="w-full">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-3 ml-2" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant select-none pointer-events-none" data-icon="lock">lock</span>
<input class="w-full bg-surface-container border-none rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-1 focus:ring-primary/30 shadow-[inset_6px_6px_12px_#dbe4eb,inset_-6px_-6px_12px_#ffffff] transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options Row -->
<div class="w-full flex items-center justify-between mt-2 mb-4 px-1">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center w-6 h-6">
<input class="peer sr-only" type="checkbox"/>
<div class="w-6 h-6 rounded-md bg-surface-container shadow-[inset_3px_3px_6px_#dbe4eb,inset_-3px_-3px_6px_#ffffff] transition-all"></div>
<div class="absolute w-3 h-3 rounded-sm bg-primary opacity-0 peer-checked:opacity-100 transition-opacity shadow-[2px_2px_4px_rgba(0,0,0,0.1)]"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full flex items-center justify-center gap-2 bg-surface-container rounded-2xl py-4 font-label-sm text-label-sm text-primary shadow-[8px_8px_16px_#dbe4eb,-8px_-8px_16px_#ffffff] hover:shadow-[6px_6px_12px_#dbe4eb,-6px_-6px_12px_#ffffff] active:shadow-[inset_6px_6px_12px_#dbe4eb,inset_-6px_-6px_12px_#ffffff] active:scale-[0.98] transition-all duration-300 ease-out" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg" data-icon="login">login</span>
</button>
</form>
</main>
</body></html>
